<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Bienvenido</title>
  <link href="css/estilos.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<!-- Barra superior -->
<nav class="navbar navbar-expand-lg navbar-light bg-success">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold text-white" href="#">COVIDAPP</a>
  </div>
</nav>

<!-- Contenido principal -->
<div class="container text-center mt-5">
  <h1 class="text-success">¡Bienvenido a COVIDAPP!</h1>
  <p id="mensajeUsuario" class="mt-3 fs-5"></p>

  <!-- Botón para ir al perfil -->
  <a href="perfil.html" class="btn btn-primary mt-3">Ir al perfil</a>

  <!-- Botón para cerrar sesión -->
  <button id="cerrarSesion" class="btn btn-outline-secondary mt-3">Cerrar sesión</button>
</div>

<script>
  // Mostrar usuario y rol activo
  const usuarioActivo = localStorage.getItem("usuarioActivo");
  const rolActivo = localStorage.getItem("rolActivo");

  document.getElementById("mensajeUsuario").textContent =
    usuarioActivo ? `Has iniciado sesión como: ${usuarioActivo} (${rolActivo})` : "Sesión activa.";

  // Cerrar sesión
  document.getElementById("cerrarSesion").addEventListener("click", () => {
    localStorage.clear();
    window.location.href = "index.html";
  });
</script>

</body>
</html>
