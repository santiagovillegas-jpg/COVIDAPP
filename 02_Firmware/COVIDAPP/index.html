<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login Pacientes</title>
  <link href="css/estilos.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="login-box">
  <h2 class="text-success text-center mb-4">Login Pacientes</h2>
  <form id="loginForm">
    <input type="text" id="usuario" class="form-control mb-3" placeholder="Usuario" required>
    <input type="password" id="contrasena" class="form-control mb-3" placeholder="Contraseña" required>
    <button type="submit" class="btn btn-success w-100">Ingresar</button>
  </form>
  <p id="mensaje" class="mt-3 text-danger text-center"></p>
  <a href="registro.html" class="btn btn-outline-primary mt-3 w-100">Registrarse</a>
</div>
<script src="js/login.js"></script>
</body>
</html>
