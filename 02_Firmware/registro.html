<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registro Pacientes</title>
  <link href="css/estilos.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="registro-box">
  <h2 class="text-success text-center mb-4">Registro Pacientes</h2>
  <form id="registroForm">
    <input type="text" id="nuevoUsuario" class="form-control mb-3" placeholder="Usuario" required>
    <input type="password" id="nuevaContrasena" class="form-control mb-3" placeholder="Contraseña" required>
    <input type="password" id="confirmarContrasena" class="form-control mb-3" placeholder="Confirmar contraseña" required>
    <div class="progress mb-3">
      <div id="barraFuerza" class="progress-bar" style="width:0%">Fuerza</div>
    </div>
    <button type="submit" class="btn btn-success w-100">Registrar</button>
  </form>
  <p id="mensajeRegistro" class="mt-3 text-center"></p>
  <a href="index.html" class="btn btn-outline-secondary mt-3 w-100">Volver al login</a>
</div>
<script src="js/registro.js"></script>
</body>
</html>
