<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Registro COVIDAPP</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #ffffff;
    }
    .registro-box {
      max-width: 400px;
      margin: 80px auto;
      padding: 20px;
      border-radius: 12px;
      background-color: #f8f9fa;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>

<div class="container text-center">
  <h1 class="text-success my-4">Registro de Usuario</h1>
  <div class="registro-box">
    <form id="registroForm">
      <div class="mb-3">
        <input type="text" id="nuevoUsuario" class="form-control" placeholder="Nuevo usuario" required>
      </div>
      <div class="mb-3">
        <input type="password" id="nuevaContrasena" class="form-control" placeholder="Contraseña" required>
      </div>
      <div class="mb-3">
        <input type="password" id="confirmarContrasena" class="form-control" placeholder="Confirmar contraseña" required>
      </div>
      <div class="d-grid gap-2">
        <button type="submit" class="btn btn-primary">Registrar</button>
      </div>
    </form>
    <div id="mensajeRegistro" class="mt-3 text-danger"></div>
    <a href="index.html" class="d-block mt-3">Volver al inicio de sesión</a>
  </div>
</div>

<script>
  document.getElementById("registroForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const usuario = document.getElementById("nuevoUsuario").value.trim();
    const contrasena = document.getElementById("nuevaContrasena").value;
    const confirmar = document.getElementById("confirmarContrasena").value;
    const mensaje = document.getElementById("mensajeRegistro");

    let usuarios = JSON.parse(localStorage.getItem("usuarios")) || [];

    if (usuarios.find(u => u.usuario === usuario)) {
      mensaje.textContent = "Este usuario ya está registrado.";
      return;
    }

    if (contrasena !== confirmar) {
      mensaje.textContent = "Las contraseñas no coinciden.";
      return;
    }

    if (contrasena.length < 4) {
      mensaje.textContent = "La contraseña debe tener al menos 4 caracteres.";
      return;
    }

    usuarios.push({ usuario: usuario, contrasena: contrasena });
    localStorage.setItem("usuarios", JSON.stringify(usuarios));

    mensaje.innerHTML = "<span class='text-success'>¡Registro exitoso! Redirigiendo...</span>";
    setTimeout(() => {
      window.location.href = "index.html";
    }, 2000);
  });
</script>

</body>
</html>
