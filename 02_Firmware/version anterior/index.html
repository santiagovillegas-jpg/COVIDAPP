<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>COVIDAPP</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
      min-height: 100vh;
    }
    .logo-title {
      font-size: 60px;
      color: limegreen;
      font-weight: bold;
      margin-top: 60px;
      text-shadow: 2px 2px 4px #000;
    }
    .login-box {
      max-width: 400px;
      margin: 40px auto;
      padding: 20px;
      border-radius: 12px;
      background-color: rgba(255,255,255,0.92);
      color: black;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
    }
    footer {
      background-color: rgba(166,240,224,0.8);
      text-align: center;
      padding: 15px;
      margin-top: 80px;
    }
    footer a { color: green; text-decoration: none; }
  </style>
</head>
<body>

<div class="container text-center">
  <h1 class="logo-title">COVIDAPP</h1>

  <div class="login-box">
    <form id="loginForm">
      <div class="mb-3">
        <input type="text" id="usuario" class="form-control" placeholder="Usuario" required>
      </div>
      <div class="mb-3">
        <input type="password" id="contrasena" class="form-control" placeholder="Contraseña" required>
      </div>
      <div class="d-grid gap-2">
        <button type="submit" class="btn btn-success">Ingresar</button>
      </div>
    </form>
    <div class="text-center mt-2">
      <a href="registro.html" class="text-secondary small">¿No tienes cuenta? Regístrate</a><br>
      <a href="#" class="text-primary small">¿Olvidaste el usuario o contraseña?</a>
    </div>
    <div id="mensaje" class="text-danger mt-3"></div>
  </div>
</div>

<footer>
  <div>
    <a href="#">Dirección</a> |
    <a href="#">Número</a> |
    <a href="#">Guía de ayuda a discapacitados</a>
  </div>
  <div class="text-muted mt-2">©️ 2025 Universidad del Quindío | Alpha build v0.0.1</div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // Crear usuario admin por defecto
  if (!localStorage.getItem("usuarios")) {
    localStorage.setItem("usuarios", JSON.stringify([{ usuario: "admin", contrasena: "1234" }]));
  }

  document.getElementById("loginForm").addEventListener("submit", function(e) {
    e.preventDefault();
    const usuarioIngresado  = document.getElementById("usuario").value;
    const contrasenaIngresada = document.getElementById("contrasena").value;
    const usuarios = JSON.parse(localStorage.getItem("usuarios"));
    const mensaje  = document.getElementById("mensaje");

    const usuarioValido = usuarios.find(
      u => u.usuario === usuarioIngresado && u.contrasena === contrasenaIngresada
    );

    if (usuarioValido) {
      // Guardar sesión activa
      localStorage.setItem("sesionActiva", usuarioIngresado);
      window.location.href = "bienvenida_con_notificaciones.html";
    } else {
      mensaje.textContent = "Usuario o contraseña incorrectos.";
    }
  });

  // Si ya hay sesión activa, redirigir directo
  if (localStorage.getItem("sesionActiva")) {
    window.location.href = "bienvenida_con_notificaciones.html";
  }
</script>
</body>
</html>
