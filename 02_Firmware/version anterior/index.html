<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>COVIDAPP</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: url('covida.jpg') no-repeat center center fixed;
      background-size: cover;
      color: white;
    }
    .logo-title {
      font-size: 60px;
      color: limegreen;
      font-weight: bold;
      margin-top: 60px;
      text-shadow: 2px 2px 4px #000;
    }
    .login-box {
      max-width: 400px;
      margin: 40px auto;
      padding: 20px;
      border-radius: 12px;
      background-color: rgba(255, 255, 255, 0.85);
      color: black;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
    }
    footer {
      background-color: rgba(166, 240, 224, 0.8);
      text-align: center;
      padding: 15px;
      margin-top: 100px;
    }
    footer a {
      color: green;
      text-decoration: none;
    }
  </style>
</head>
<body>

<div class="container text-center">
  <h1 class="logo-title">COVIDAPP</h1>

  <!-- Login -->
  <div class="login-box">
    <form id="loginForm">
      <div class="mb-3">
        <input type="text" id="usuario" class="form-control" placeholder="Usuario" required>
      </div>
      <div class="mb-3">
        <input type="password" id="contrasena" class="form-control" placeholder="Contraseña" required>
      </div>
      <div class="d-grid gap-2">
        <button type="submit" class="btn btn-success">Ingresar</button>
      </div>
    </form>
    <div class="text-center mt-2">
      <a href="registro.html" class="text-secondary small">¿No tienes cuenta? Regístrate</a><br>
      <a href="#" class="text-primary small">¿Olvidaste el usuario o contraseña?</a>
    </div>
    <div id="mensaje" class="text-danger mt-3"></div>
  </div>
</div>

<!-- Footer -->
<footer>
  <div>
    <a href="#">Dirección</a> |
    <a href="#">Número</a> |
    <a href="#">Guía de ayuda a discapacitados</a>
  </div>
  <div class="text-muted mt-2">©️ 2025 Universidad del Quindío | Alpha build v0.0.1</div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  if (!localStorage.getItem("usuarios")) {
    const usuarios = [{ usuario: "admin", contrasena: "1234" }];
    localStorage.setItem("usuarios", JSON.stringify(usuarios));
  }

  document.getElementById("loginForm").addEventListener("submit", function(e) {
    e.preventDefault();
    const usuarioIngresado = document.getElementById("usuario").value;
    const contrasenaIngresada = document.getElementById("contrasena").value;
    const usuarios = JSON.parse(localStorage.getItem("usuarios"));
    const mensaje = document.getElementById("mensaje");

    const usuarioValido = usuarios.find(u => u.usuario === usuarioIngresado && u.contrasena === contrasenaIngresada);

    if (usuarioValido) {
      window.location.href = 'bienvenida.html';
    } else {
      mensaje.textContent = "Usuario o contraseña incorrectos.";
    }
  });
</script>

</body>
</html>
