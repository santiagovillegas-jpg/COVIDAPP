<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Historial y Diagnóstico - COVIDAPP</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #f8f9fa;
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23198754' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }
    .main-container {
      max-width: 900px;
      margin: 40px auto;
    }
    .card {
      border-radius: 15px;
      border: none;
      box-shadow: 0 5px 20px rgba(0,0,0,0.08);
      margin-bottom: 25px;
    }
    .nav-tabs .nav-link {
      color: #6c757d;
      font-weight: 600;
      border: none;
      padding: 15px 25px;
    }
    .nav-tabs .nav-link.active {
      color: #198754;
      border-bottom: 3px solid #198754;
      background: transparent;
    }
    .btn-save {
      background-color: #198754;
      color: white;
      font-weight: 600;
    }
    .btn-save:hover {
      background-color: #157347;
      color: white;
    }
    .diag-item {
      border-left: 4px solid #198754;
      background: #fdfdfd;
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 0 8px 8px 0;
    }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand fw-bold text-success" href="bienvenida.html">COVIDAPP</a>
    <div class="navbar-nav ms-auto">
      <a class="nav-link" href="bienvenida.html">Volver al Inicio</a>
    </div>
  </div>
</nav>

<div class="container main-container">
  <div class="card p-4">
    <h2 class="text-success mb-4 fw-bold text-center">Gestión Médica Integral</h2>
    
    <!-- TABS -->
    <ul class="nav nav-tabs mb-4" id="medicoTab" role="tablist">
      <li class="nav-item" role="presentation">
        <button class="nav-link active" id="perfil-tab" data-bs-toggle="tab" data-bs-target="#perfil" type="button" role="tab">Perfil Clínico</button>
      </li>
      <li class="nav-item" role="presentation">
        <button class="nav-link" id="diagnosticos-tab" data-bs-toggle="tab" data-bs-target="#diagnosticos" type="button" role="tab">Registro de Diagnósticos</button>
      </li>
    </ul>

    <div class="tab-content" id="medicoTabContent">
      
      <!-- SECCION: PERFIL CLINICO (HISTORIAL) -->
      <div class="tab-pane fade show active" id="perfil" role="tabpanel">
        <form id="historialForm">
          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label fw-bold">Nombre Completo</label>
              <input type="text" id="nombreCompleto" class="form-control" required>
            </div>
            <div class="col-md-3 mb-3">
              <label class="form-label fw-bold">Edad</label>
              <input type="number" id="edad" class="form-control" min="0" required>
            </div>
            <div class="col-md-3 mb-3">
              <label class="form-label fw-bold">Tipo de Sangre</label>
              <select id="tipoSangre" class="form-select">
                <option value="">...</option>
                <option value="A+">A+</option><option value="A-">A-</option>
                <option value="B+">B+</option><option value="B-">B-</option>
                <option value="AB+">AB+</option><option value="AB-">AB-</option>
                <option value="O+">O+</option><option value="O-">O-</option>
              </select>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold">Alergias Conocidas</label>
            <textarea id="alergias" class="form-control" rows="2"></textarea>
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold">Enfermedades Preexistentes</label>
            <textarea id="enfermedades" class="form-control" rows="2"></textarea>
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold">Medicamentos de Uso Diario</label>
            <textarea id="medicamentos" class="form-control" rows="2"></textarea>
          </div>
          <div class="text-end">
            <button type="submit" class="btn btn-save px-5">Guardar Perfil</button>
          </div>
        </form>
      </div>

      <!-- SECCION: DIAGNOSTICOS -->
      <div class="tab-pane fade" id="diagnosticos" role="tabpanel">
        <div class="row">
          <!-- Formulario nuevo diagnóstico -->
          <div class="col-md-5">
            <h5 class="mb-3 text-secondary">Nuevo Registro</h5>
            <form id="diagnosticoForm" class="bg-light p-3 rounded">
              <div class="mb-2">
                <label class="form-label small fw-bold">Fecha del Diagnóstico</label>
                <input type="date" id="diagFecha" class="form-control form-control-sm" required>
              </div>
              <div class="mb-2">
                <label class="form-label small fw-bold">Síntomas Reportados</label>
                <textarea id="diagSintomas" class="form-control form-control-sm" rows="2" placeholder="Tos, fiebre, fatiga..."></textarea>
              </div>
              <div class="mb-2">
                <label class="form-label small fw-bold">Resultado / Diagnóstico</label>
                <input type="text" id="diagResultado" class="form-control form-control-sm" placeholder="Ej: COVID-19 Negativo" required>
              </div>
              <div class="mb-3">
                <label class="form-label small fw-bold">Observaciones Médicas</label>
                <textarea id="diagObs" class="form-control form-control-sm" rows="2"></textarea>
              </div>
              <button type="submit" class="btn btn-success btn-sm w-100">Agregar al Registro</button>
            </form>
          </div>
          
          <!-- Lista de diagnósticos -->
          <div class="col-md-7">
            <h5 class="mb-3 text-secondary">Historial de Diagnósticos</h5>
            <div id="listaDiagnosticos" style="max-height: 400px; overflow-y: auto;">
              <!-- Se cargan dinámicamente -->
            </div>
          </div>
        </div>
      </div>

    </div>
    <div id="mensajeGlobal" class="mt-3 text-center"></div>
  </div>
</div>

<script>
  const usuarioLogueado = localStorage.getItem("usuarioLogueado");
  if (!usuarioLogueado) window.location.href = 'index.html';

  // CARGA INICIAL
  document.addEventListener("DOMContentLoaded", () => {
    cargarPerfil();
    cargarDiagnosticos();
  });

  // --- LOGICA PERFIL ---
  function cargarPerfil() {
    const historiales = JSON.parse(localStorage.getItem("historiales")) || {};
    const miPerfil = historiales[usuarioLogueado];
    if (miPerfil) {
      document.getElementById("nombreCompleto").value = miPerfil.nombreCompleto || "";
      document.getElementById("edad").value = miPerfil.edad || "";
      document.getElementById("tipoSangre").value = miPerfil.tipoSangre || "";
      document.getElementById("alergias").value = miPerfil.alergias || "";
      document.getElementById("enfermedades").value = miPerfil.enfermedades || "";
      document.getElementById("medicamentos").value = miPerfil.medicamentos || "";
    }
  }

  document.getElementById("historialForm").addEventListener("submit", (e) => {
    e.preventDefault();
    const datos = {
      nombreCompleto: document.getElementById("nombreCompleto").value,
      edad: document.getElementById("edad").value,
      tipoSangre: document.getElementById("tipoSangre").value,
      alergias: document.getElementById("alergias").value,
      enfermedades: document.getElementById("enfermedades").value,
      medicamentos: document.getElementById("medicamentos").value
    };
    let historiales = JSON.parse(localStorage.getItem("historiales")) || {};
    historiales[usuarioLogueado] = datos;
    localStorage.setItem("historiales", JSON.stringify(historiales));
    mostrarMensaje("Perfil Clínico actualizado correctamente", "text-success");
  });

  // --- LOGICA DIAGNOSTICOS ---
  function cargarDiagnosticos() {
    const todosDiagnosticos = JSON.parse(localStorage.getItem("diagnosticos")) || {};
    const misDiag = todosDiagnosticos[usuarioLogueado] || [];
    const contenedor = document.getElementById("listaDiagnosticos");
    contenedor.innerHTML = "";

    if (misDiag.length === 0) {
      contenedor.innerHTML = "<p class='text-muted small'>No hay diagnósticos registrados.</p>";
      return;
    }

    misDiag.sort((a,b) => new Date(b.fecha) - new Date(a.fecha)).forEach(d => {
      contenedor.innerHTML += `
        <div class="diag-item">
          <div class="d-flex justify-content-between">
            <span class="fw-bold text-success">${d.fecha}</span>
            <span class="badge bg-secondary">${d.resultado}</span>
          </div>
          <div class="mt-2 small">
            <strong>Síntomas:</strong> ${d.sintomas || 'Ninguno'}<br>
            <strong>Notas:</strong> ${d.observaciones || '-'}
          </div>
        </div>
      `;
    });
  }

  document.getElementById("diagnosticoForm").addEventListener("submit", (e) => {
    e.preventDefault();
    const nuevoDiag = {
      fecha: document.getElementById("diagFecha").value,
      sintomas: document.getElementById("diagSintomas").value,
      resultado: document.getElementById("diagResultado").value,
      observaciones: document.getElementById("diagObs").value
    };

    let todosDiagnosticos = JSON.parse(localStorage.getItem("diagnosticos")) || {};
    if (!todosDiagnosticos[usuarioLogueado]) todosDiagnosticos[usuarioLogueado] = [];
    todosDiagnosticos[usuarioLogueado].push(nuevoDiag);
    
    localStorage.setItem("diagnosticos", JSON.stringify(todosDiagnosticos));
    document.getElementById("diagnosticoForm").reset();
    cargarDiagnosticos();
    mostrarMensaje("Nuevo diagnóstico registrado", "text-success");
  });

  function mostrarMensaje(texto, clase) {
    const msg = document.getElementById("mensajeGlobal");
    msg.innerHTML = `<span class="${clase} fw-bold">${texto}</span>`;
    setTimeout(() => msg.innerHTML = "", 3000);
  }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
