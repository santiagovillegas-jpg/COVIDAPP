<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Historial Médico - COVIDAPP</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: url('covida.jpg') no-repeat center center fixed;
      background-size: cover;
      color: white;
    }
    .historial-box {
      max-width: 600px;
      margin: 40px auto;
      padding: 30px;
      border-radius: 12px;
      background-color: rgba(255, 255, 255, 0.9);
      color: black;
      box-shadow: 0 0 15px rgba(0,0,0,0.4);
    }
    .form-label {
      font-weight: bold;
    }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand fw-bold text-success" href="bienvenida.html">COVIDAPP</a>
    <div class="navbar-nav ms-auto">
      <a class="nav-link" href="bienvenida.html">Volver al Inicio</a>
    </div>
  </div>
</nav>

<div class="container">
  <div class="historial-box">
    <h2 class="text-center text-success mb-4">Editar Historial Médico</h2>
    <form id="historialForm">
      <div class="row">
        <div class="col-md-6 mb-3">
          <label for="nombreCompleto" class="form-label">Nombre Completo</label>
          <input type="text" id="nombreCompleto" class="form-control" placeholder="Ej: Juan Pérez" required>
        </div>
        <div class="col-md-3 mb-3">
          <label for="edad" class="form-label">Edad</label>
          <input type="number" id="edad" class="form-control" min="0" required>
        </div>
        <div class="col-md-3 mb-3">
          <label for="tipoSangre" class="form-label">Tipo de Sangre</label>
          <select id="tipoSangre" class="form-select">
            <option value="">Seleccione...</option>
            <option value="A+">A+</option>
            <option value="A-">A-</option>
            <option value="B+">B+</option>
            <option value="B-">B-</option>
            <option value="AB+">AB+</option>
            <option value="AB-">AB-</option>
            <option value="O+">O+</option>
            <option value="O-">O-</option>
          </select>
        </div>
      </div>

      <div class="mb-3">
        <label for="alergias" class="form-label">Alergias</label>
        <textarea id="alergias" class="form-control" rows="2" placeholder="Ej: Penicilina, Polen..."></textarea>
      </div>

      <div class="mb-3">
        <label for="enfermedades" class="form-label">Enfermedades Crónicas</label>
        <textarea id="enfermedades" class="form-control" rows="2" placeholder="Ej: Diabetes, Hipertensión..."></textarea>
      </div>

      <div class="mb-3">
        <label for="medicamentos" class="form-label">Medicamentos Actuales</label>
        <textarea id="medicamentos" class="form-control" rows="2" placeholder="Ej: Metformina 500mg..."></textarea>
      </div>

      <hr>
      <h5 class="mb-3">Contacto de Emergencia</h5>
      <div class="row">
        <div class="col-md-7 mb-3">
          <label for="contactoNombre" class="form-label">Nombre del Contacto</label>
          <input type="text" id="contactoNombre" class="form-control" placeholder="Nombre completo">
        </div>
        <div class="col-md-5 mb-3">
          <label for="contactoTelefono" class="form-label">Teléfono</label>
          <input type="tel" id="contactoTelefono" class="form-control" placeholder="+57 ...">
        </div>
      </div>

      <div class="d-grid gap-2 mt-4">
        <button type="submit" class="btn btn-success btn-lg">Guardar Historial</button>
        <a href="bienvenida.html" class="btn btn-outline-secondary">Cancelar</a>
      </div>
    </form>
    <div id="mensajeHistorial" class="mt-3 text-center"></div>
  </div>
</div>

<script>
  // Verificar sesión
  const usuarioLogueado = localStorage.getItem("usuarioLogueado");
  if (!usuarioLogueado) {
    window.location.href = 'index.html';
  }

  // Cargar datos existentes
  document.addEventListener("DOMContentLoaded", function() {
    const historiales = JSON.parse(localStorage.getItem("historiales")) || {};
    const miHistorial = historiales[usuarioLogueado];

    if (miHistorial) {
      document.getElementById("nombreCompleto").value = miHistorial.nombreCompleto || "";
      document.getElementById("edad").value = miHistorial.edad || "";
      document.getElementById("tipoSangre").value = miHistorial.tipoSangre || "";
      document.getElementById("alergias").value = miHistorial.alergias || "";
      document.getElementById("enfermedades").value = miHistorial.enfermedades || "";
      document.getElementById("medicamentos").value = miHistorial.medicamentos || "";
      document.getElementById("contactoNombre").value = miHistorial.contactoNombre || "";
      document.getElementById("contactoTelefono").value = miHistorial.contactoTelefono || "";
    }
  });

  // Guardar datos
  document.getElementById("historialForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const datos = {
      nombreCompleto: document.getElementById("nombreCompleto").value,
      edad: document.getElementById("edad").value,
      tipoSangre: document.getElementById("tipoSangre").value,
      alergias: document.getElementById("alergias").value,
      enfermedades: document.getElementById("enfermedades").value,
      medicamentos: document.getElementById("medicamentos").value,
      contactoNombre: document.getElementById("contactoNombre").value,
      contactoTelefono: document.getElementById("contactoTelefono").value
    };

    let historiales = JSON.parse(localStorage.getItem("historiales")) || {};
    historiales[usuarioLogueado] = datos;
    localStorage.setItem("historiales", JSON.stringify(historiales));

    const mensaje = document.getElementById("mensajeHistorial");
    mensaje.innerHTML = "<span class='text-success fw-bold'>¡Historial guardado exitosamente!</span>";
    
    setTimeout(() => {
      window.location.href = "bienvenida.html";
    }, 1500);
  });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
