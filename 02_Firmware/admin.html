<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login Administrador</title>
  <link href="css/estilos.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="login-box">
  <h2 class="text-danger text-center mb-4">Login Administrador</h2>
  <form id="adminForm">
    <input type="text" id="adminUsuario" class="form-control mb-3" placeholder="Usuario" required>
    <input type="password" id="adminContrasena" class="form-control mb-3" placeholder="Contraseña" required>
    <button type="submit" class="btn btn-danger w-100">Ingresar</button>
  </form>
  <p id="mensajeAdmin" class="mt-3 text-danger text-center"></p>
  <a href="index.html" class="btn btn-outline-secondary mt-3 w-100">Volver al login pacientes</a>
</div>
<script src="js/admin.js"></script>
</body>
</html>
